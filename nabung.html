<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NabungYuk - Sahabat Menabungmu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #A29BFE;
            --success: #00B894;
            --warning: #FAB1A0;
            --danger: #FF7675;
            --bg: #F9FAFC;
        }

        body {
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            color: #2D3436;
            min-height: 100vh;
        }

        /* Layar Awal (Input Nama) */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; text-align: center;
        }

        /* Header Area */
        header {
            background: white; padding: 30px 20px;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { margin: 0; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
        #userGreeting { font-weight: 600; color: #636E72; margin-top: 5px; }

        .container { max-width: 480px; margin: 20px auto; padding: 0 20px; }

        /* Kartu Tabungan */
        .card {
            background: white; border-radius: 25px; padding: 20px;
            margin-bottom: 20px; border: 1px solid #F1F2F6;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .progress-container {
            background: #F1F2F6; height: 35px; border-radius: 100px;
            margin: 15px 0; position: relative; overflow: hidden;
        }

        .progress-bar {
            height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%; transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; font-weight: 800;
        }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        input {
            padding: 14px; border-radius: 15px; border: 2px solid #EDF2F7;
            font-size: 16px; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .btn-box { display: flex; gap: 10px; }
        .btn {
            border: none; padding: 14px; border-radius: 15px;
            font-weight: 800; cursor: pointer; flex: 1; transition: 0.2s;
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-add { background: var(--success); color: white; }
        .btn-sub { background: var(--warning); color: #D63031; }

        .fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 65px; height: 65px; border-radius: 20px;
            background: var(--primary); color: white; font-size: 30px;
            border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 400px;
        }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <h1>👋 Halo!</h1>
    <p>Boleh tahu siapa namamu?</p>
    <input type="text" id="userNameInput" placeholder="Ketik namamu..." style="width: 250px; text-align: center;">
    <button class="btn btn-save" onclick="setupUser()" style="margin-top: 15px; flex: none; width: 250px;">Mulai Nabung!</button>
</div>

<header>
    <h1>NabungYuk 🚀</h1>
    <div id="userGreeting">Halo, Sobat!</div>
</header>

<div class="container" id="mainList"></div>

<button class="fab" onclick="showModal()">+</button>

<div class="modal" id="targetModal">
    <div class="modal-content">
        <h2 style="margin-top:0">Target Baru ✨</h2>
        <div class="input-group">
            <input type="text" id="targetName" placeholder="Mau beli apa?">
            <input type="number" id="targetPrice" placeholder="Harganya berapa?">
            <button class="btn btn-save" onclick="addNewTarget()">Tambahkan</button>
            <button onclick="closeModal()" style="background:none; border:none; color:gray; cursor:pointer">Tutup</button>
        </div>
    </div>
</div>

<script>
    let userData = JSON.parse(localStorage.getItem('nabungYuk_User')) || null;
    let targets = JSON.parse(localStorage.getItem('nabungYuk_Targets')) || [];

    window.onload = () => {
        if(!userData) {
            document.getElementById('welcomeScreen').style.display = 'flex';
        } else {
            greetUser();
            render();
        }
    };

    function setupUser() {
        const name = document.getElementById('userNameInput').value;
        if(name) {
            userData = { name: name };
            localStorage.setItem('nabungYuk_User', JSON.stringify(userData));
            document.getElementById('welcomeScreen').style.display = 'none';
            greetUser();
            speak(`Halo ${name}, selamat datang di Nabung Yuk!`);
            render();
        }
    }

    function greetUser() {
        document.getElementById('userGreeting').innerText = `Hai ${userData.name}, semangat nabungnya ya! ✨`;
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
    }

    function showModal() { document.getElementById('targetModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('targetModal').style.display = 'none'; }

    function addNewTarget() {
        const nama = document.getElementById('targetName').value;
        const harga = parseFloat(document.getElementById('targetPrice').value);
        if(nama && harga > 0) {
            targets.push({ id: Date.now(), nama, harga, saldo: 0 });
            save();
            closeModal();
            speak(`Target ${nama} berhasil dibuat!`);
            document.getElementById('targetName').value = '';
            document.getElementById('targetPrice').value = '';
        }
    }

    function updateSaldo(id, type) {
        const input = document.getElementById(`in-${id}`);
        const val = parseFloat(input.value);
        const idx = targets.findIndex(t => t.id === id);

        if(val > 0) {
            if(type === 'add') {
                targets[idx].saldo += val;
                confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
                speak(`Mantap ${userData.name}! ${val} rupiah sudah masuk tabungan.`);
            } else {
                if(targets[idx].saldo >= val) {
                    targets[idx].saldo -= val;
                    speak(`Oke ${userData.name}, uang diambil ${val} rupiah.`);
                } else {
                    speak(`Duh ${userData.name}, uangnya tidak cukup.`);
                }
            }
            input.value = '';
            save();
            
            if(targets[idx].saldo >= targets[idx].harga && type === 'add') {
                setTimeout(() => speak(`HORE! Selamat ${userData.name}, target ${targets[idx].nama} sudah tercapai! Kamu hebat!`), 1000);
            }
        }
    }

    function save() {
        localStorage.setItem('nabungYuk_Targets', JSON.stringify(targets));
        render();
    }

    function deleteTarget(id) {
        if(confirm('Hapus target ini?')) {
            targets = targets.filter(t => t.id !== id);
            save();
        }
    }

    function render() {
        const list = document.getElementById('mainList');
        list.innerHTML = '';
        if(targets.length === 0) {
            list.innerHTML = `<div style="text-align:center; margin-top:50px; color:#A0AEC0;">Hai ${userData.name}, belum ada target nih.<br>Klik + untuk buat target ya!</div>`;
            return;
        }

        targets.forEach(t => {
            const persen = Math.min((t.saldo / t.harga) * 100, 100).toFixed(0);
            list.innerHTML += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:start">
                        <h2 style="margin:0; font-size:20px">${t.nama}</h2>
                        <button onclick="deleteTarget(${t.id})" style="border:none; background:none; color:#CED4DA; cursor:pointer">✕</button>
                    </div>
                    <div style="color:var(--primary); font-weight:800; margin:5px 0">Rp ${t.harga.toLocaleString()}</div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${persen}%">${persen}%</div>
                    </div>
                    
                    <div style="font-size:14px; margin-bottom:15px">Terkumpul: <b>Rp ${t.saldo.toLocaleString()}</b></div>
                    
                    <div class="input-group">
                        <input type="number" id="in-${t.id}" placeholder="Masukkan jumlah...">
                        <div class="btn-box">
                            <button class="btn btn-add" onclick="updateSaldo(${t.id}, 'add')">NABUNG</button>
                            <button class="btn btn-sub" onclick="updateSaldo(${t.id}, 'sub')">AMBIL</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
